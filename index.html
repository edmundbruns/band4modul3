const QUIZ = [{"q": "Was ist der Kern von Modul 4.3?", "options": ["Beweise sichern und Täter ermitteln.", "Einen Verdachtsfall fachlich, dokumentiert und über vorgesehene Wege bearbeiten.", "Eltern immer sofort informieren.", "Das Jugendamt ersetzen."], "correct": 1}, {"q": "Welche Aussage passt zur niedersächsischen Linie?", "options": ["Schulsozialarbeit entscheidet allein über Kindeswohlgefährdung.", "Schulsozialarbeit nimmt wahr, dokumentiert, berät sich und nutzt lokale Verfahrenswege.", "Schulsozialarbeit hat nur eine pädagogische Gesprächsrolle ohne Schutzverantwortung.", "Schulsozialarbeit muss jeden Hinweis öffentlich im Kollegium teilen."], "correct": 1}, {"q": "Was ist unmittelbar nach einem belastenden Hinweis fachlich sinnvoll?", "options": ["Ruhe bewahren, Schutzbedarf prüfen, sachlich dokumentieren, Rückspracheweg klären.", "Das Kind mehrfach detailliert befragen.", "Die Eltern sofort konfrontieren.", "Nichts notieren, um Datenschutzprobleme zu vermeiden."], "correct": 0}, {"q": "Welche Frage an ein Kind ist am wenigsten suggestiv?", "options": ["Hat dein Vater dich wieder geschlagen?", "Was ist passiert?", "War deine Mutter betrunken?", "Du hast Angst nach Hause zu gehen, oder?"], "correct": 1}, {"q": "Wann ist Elternbeteiligung besonders vorsichtig abzuwägen?", "options": ["Wenn Eltern mögliche Gefährdungspersonen sein könnten.", "Immer, auch bei allgemeinem Unterstützungswunsch.", "Nie, Eltern haben kein Informationsrecht.", "Nur wenn eine Lehrkraft zustimmt."], "correct": 0}, {"q": "Was ist bei akuter Gefahr vorrangig?", "options": ["Beratung fortsetzen.", "Schutz, Sicherheit und zuständige Wege aktivieren.", "Abwarten bis zum nächsten Termin.", "Vertraulichkeit absolut halten."], "correct": 1}, {"q": "Welche Dokumentation ist fachlich sauber?", "options": ["Familie völlig problematisch.", "Kind wird sicher misshandelt.", "12.06., 10:20 Uhr: Kind sagt wörtlich: 'Papa hat mich am Arm gepackt.' Sichtbarer blauer Fleck rechter Oberarm.", "Eltern lügen vermutlich."], "correct": 2}, {"q": "Was bedeutet Erforderlichkeit bei Informationsweitergabe?", "options": ["Alle Details werden weitergegeben.", "Nur notwendige Informationen werden an geeignete Stellen im vorgesehenen Weg gegeben.", "Gar nichts darf weitergegeben werden.", "Alle Lehrkräfte dürfen alles wissen."], "correct": 1}, {"q": "Welche Rolle hat die insoweit erfahrene Fachkraft bzw. Fachberatung?", "options": ["Sie ersetzt jede Dokumentation.", "Sie unterstützt die Einschätzung und das weitere Vorgehen fachlich.", "Sie führt automatisch die Elternkonfrontation durch.", "Sie ist nur bei Disziplinproblemen zuständig."], "correct": 1}, {"q": "Was ist bei digitaler Gefährdung wichtig?", "options": ["Bilder sichern, weiterleiten und im Kollegium prüfen.", "Keine eigenständige Beweissicherung durch Schule, Schutz und Fachberatung priorisieren.", "Immer sofort alle Chats lesen.", "Digitale Fälle sind kein Kinderschutzthema."], "correct": 1}, {"q": "Ein Kind bittet um absolute Geheimhaltung. Was ist angemessen?", "options": ["Ich verspreche, niemand erfährt etwas.", "Ich verspreche dir, dass ich nichts über deinen Kopf hinweg mache. Wenn Schutz nötig wird, hole ich Unterstützung und bespreche das so transparent wie möglich.", "Dann kann ich dir nicht zuhören.", "Ich informiere sofort alle Beteiligten."], "correct": 1}, {"q": "Was ist ein typischer Fehler im Verdachtsfall?", "options": ["Fachberatung nutzen.", "Beobachtungen sachlich dokumentieren.", "Mögliche Gefährdungspersonen vorschnell konfrontieren.", "Erforderliche Informationen begrenzt weitergeben."], "correct": 2}, {"q": "Was gehört zu einem ersten Ablaufplan?", "options": ["Anlass, Schutzbedarf, Beteiligte, Rücksprache, Dokumentation, nächster Schritt.", "Nur Bauchgefühl und schnelle Lösung.", "Ausschließlich Gespräch mit Eltern.", "Nur Meldung ohne Kontext."], "correct": 0}, {"q": "Welche Aussage zu Schulleitung ist fachlich passend?", "options": ["Schulleitung bekommt immer alle vertraulichen Inhalte.", "Schulleitung kann im schulischen Verfahrensweg relevant sein, Informationsweitergabe bleibt aber erforderlichkeitsbezogen.", "Schulleitung darf nie eingebunden werden.", "Schulleitung entscheidet allein über Jugendhilfemaßnahmen."], "correct": 1}, {"q": "Was ist bei Verdacht auf sexualisierte Gewalt besonders wichtig?", "options": ["Keine Detailbefragung, keine Konfrontation möglicher Tatpersonen, Fachberatung und Schutzweg klären.", "Möglichst viele Details selbst erfragen.", "Tatperson sofort zur Rede stellen.", "In der Klasse allgemein besprechen."], "correct": 0}, {"q": "Wann reicht normale Beratung nicht mehr aus?", "options": ["Bei jedem Elternärger.", "Bei konkreter akuter Selbst- oder Fremdgefährdung oder unmittelbarem Schutzbedarf.", "Bei jeder Müdigkeit.", "Bei jedem Streit auf dem Schulhof."], "correct": 1}, {"q": "Was ist Ziel einer Verdachtsfallbearbeitung?", "options": ["Schnelle Schuldzuweisung.", "Fachlich begründetes, verhältnismäßiges und dokumentiertes Schutzhandeln.", "Alle beruhigen, ohne etwas zu dokumentieren.", "Den Fall allein lösen."], "correct": 1}, {"q": "Was zeigt professionelle Haltung im Kinderschutz?", "options": ["Panik und Aktionismus.", "Wegschauen aus Angst vor Fehlern.", "Ruhe, Beteiligung, klare Grenzen, Rücksprache und Schutzorientierung.", "Private Bewertung der Familie."], "correct": 2}, {"q": "Welche Aussage passt zum Emsland-Fokus dieses Moduls?", "options": ["Das Modul ersetzt die lokale Kooperationsvereinbarung.", "Regionale Meldebögen, Schutzkonzepte und Zuständigkeiten müssen am Schulstandort geprüft werden.", "Im Emsland gelten keine schulischen Verfahrenswege.", "Das Jugendamt wird erst nach Abschluss aller Gespräche informiert."], "correct": 1}, {"q": "Was gehört zur Vorbereitung einer Fachberatung?", "options": ["Vermutungen möglichst dramatisch formulieren.", "Beobachtungen, wörtliche Aussagen, Schutzfaktoren, Risiken und konkrete Beratungsfrage strukturieren.", "Eltern vorher grundsätzlich konfrontieren.", "Chatbilder sammeln und weiterleiten."], "correct": 1}, {"q": "Warum ist eine Verlaufsdokumentation wichtig?", "options": ["Sie ersetzt Fachberatung.", "Sie macht Entwicklung, Entscheidungen und nächste Schritte nachvollziehbar.", "Sie dient der Beweissicherung durch Schule.", "Sie wird nur bei abgeschlossenen Fällen benötigt."], "correct": 1}, {"q": "Was ist bei der Nutzung regionaler Emsland-Unterlagen im Verdachtsfall fachlich wichtig?", "options": ["Die Unterlagen ersetzen jede fachliche Einschätzung.", "Meldebogen, Checkliste und Ablaufschema werden als lokale Verfahrenshilfen genutzt und mit der schulischen Zuständigkeit abgeglichen.", "Regionale Unterlagen sind nur für Kindertagesstätten relevant.", "Der Meldebogen darf ohne vorherige fachliche Sortierung automatisch versendet werden."], "correct": 1}, {"q": "Was gehört zu einem lokalen Verfahrenscheck im Emsland?", "options": ["Aktuelles Schutzkonzept, interne Ansprechperson, Meldebogen, Jugendhilfeweg, Notfallweg und sicherer Dokumentationsort prüfen.", "Nur die Telefonnummer des Jugendamtes googeln.", "Den alten Meldebogen aus einem anderen Landkreis übernehmen.", "Die Zuständigkeit erst klären, wenn der Fall abgeschlossen ist."], "correct": 0}, {"q": "Was ist bei digitaler Ablage im Verdachtsfall fachlich riskant?", "options": ["Sensible Notizen auf privaten Geräten oder in Messengergruppen zu speichern.", "Nach lokalem Verfahren sachlich zu dokumentieren.", "Informationen erforderlichkeitsbezogen weiterzugeben.", "Den Dokumentationsort der Schule zu nutzen."], "correct": 0}, {"q": "Was macht eine gute Vorbereitung auf eine Fachberatung aus?", "options": ["Dramatisierende Vermutungen und möglichst viele Details.", "Anlass, Beobachtungen, wörtliche Aussagen, Risiken, Schutzfaktoren und konkrete Beratungsfrage klar strukturieren.", "Vorher immer die Eltern konfrontieren.", "Beweise sammeln und Bilder weiterleiten."], "correct": 1}, {"q": "Warum darf das Modul keine konkrete Emsland-Dienstanweisung ersetzen?", "options": ["Weil lokale Zuständigkeiten, Formulare und Notfallwege regelmäßig am Schulstandort aktuell geprüft werden müssen.", "Weil regionale Verfahrenswege im Kinderschutz unwichtig sind.", "Weil Schulen im Emsland keine Schutzkonzepte benötigen.", "Weil Datenschutz im Kinderschutz nicht gilt."], "correct": 0}];
const SECTION_HTML = {"start": `\n<section class=\"card\"><h2>Einordnung in die Reihe</h2><p><strong>Band 4, Modul 3</strong> schließt an Modul 4.2 an. Dort wurden gewichtige Anhaltspunkte erkannt und eingeordnet. Dieses Modul fragt: <strong>Was ist jetzt im Verdachtsfall fachlich, rechtlich vorsichtig und im schulischen Alltag Niedersachsens zu tun?</strong></p><div class=\"grid\"><div class=\"note\"><strong>Linie aus Band 1:</strong><br>Schulsozialarbeit bleibt sozialpädagogisch, unterstützend und keine Ermittlungs- oder Ordnungsinstanz.</div><div class=\"note blue\"><strong>Linie aus Band 2:</strong><br>Datenschutz, Schweigepflicht, Erforderlichkeit und Dokumentation werden nicht aufgehoben, sondern im Schutzkontext abgewogen.</div><div class=\"note green\"><strong>Linie aus Band 3:</strong><br>Gespräche bleiben transparent, nicht suggestiv und beteiligend. Bei Schutzbedarf verändert sich der Auftrag.</div><div class=\"note red\"><strong>Linie aus Band 4:</strong><br>Keine Einzelentscheidung. Schutzlogik, Fachberatung und lokale Verfahrenswege bestimmen das Vorgehen.</div></div><div class=\"note blue\"><strong>Regionaler Fokus Emsland:</strong> Dieses Modul ist für Schulen in Niedersachsen mit besonderem Blick auf das Emsland formuliert. Es ersetzt keine schulinterne Dienstanweisung. Für die Praxis sind die jeweils aktuelle Kooperationsvereinbarung der Schule, der schulische Kinderschutzplan, die zuständigen Ansprechwege des Landkreises Emsland beziehungsweise der zuständigen Jugendhilfe und die aktuellen Melde-/Dokumentationsbögen maßgeblich. Veraltete Downloads oder fremde Landkreis-Materialien dürfen nicht ungeprüft übernommen werden.</div>
<div class=\"callout\"><h3>Hochschuldidaktische Rahmung</h3><div class=\"meta\"><div><strong>Kompetenzniveau:</strong><br>Grundständiges Studium / Anerkennungsjahr / Weiterbildung</div><div><strong>Workload:</strong><br>ca. 6 bis 8 Stunden inklusive Transferauftrag</div><div><strong>Voraussetzungen:</strong><br>Band 2 Recht/Datenschutz und Band 4.1 bis 4.2</div><div><strong>Prüfungsleistung:</strong><br>Quiz ≥ 80 %, Fallbearbeitung ≥ 2000 Zeichen, lokaler Verfahrenscheck</div></div><p><strong>Messbare Lernziele:</strong> Teilnehmende können Verdachtslagen voneinander abgrenzen, nicht suggestive Erstgespräche führen, Fachberatung strukturiert vorbereiten, Elternbeteiligung risikobezogen abwägen, erforderliche Informationen datenschutzsensibel weitergeben und einen lokalen Verfahrenscheck für Niedersachsen/Emsland durchführen.</p></div></section>\n<section class=\"card\"><h2>Begriffsabgleich</h2><table><tr><th>Lage</th><th>Bedeutung</th><th>Vorgehen</th></tr><tr><td>Unklare Sorge</td><td>Es gibt Hinweise, aber noch keine tragfähige Einordnung.</td><td>Sortieren, dokumentieren, Rücksprache prüfen.</td></tr><tr><td>Verdacht</td><td>Konkrete Hinweise sind vorhanden und dürfen nicht im normalen Beratungskontext verbleiben.</td><td>Fachlich beraten, Verfahren prüfen, nicht allein handeln.</td></tr><tr><td>Gewichtige Anhaltspunkte</td><td>Hinweise verdichten sich so, dass Schutzlogik und formalisierte Wege erforderlich werden.</td><td>Fachberatung / Leitung / lokales Verfahren nutzen.</td></tr><tr><td>Akute Gefahr</td><td>Unmittelbarer Schutzbedarf oder Selbst-/Fremdgefährdung.</td><td>Sofortlogik, Leitung, zuständige Stellen / Notfallweg.</td></tr></table></section>\n<div class=\"task\"><h3>Formulieren Sie in drei Sätzen, worin der Unterschied zwischen normaler Beratung, Verdacht und akuter Gefahr liegt.</h3><textarea id=\"t_start\" rows=\"4\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_start\" class=\"analysis\"></div></div>\n<div class=\"solution hidden\" id=\"s_start\"><strong>Musterlösung:</strong> Normale Beratung arbeitet mit Anliegen, Auftrag und freiwilliger Beteiligung. Ein Verdacht verlangt sachliche Dokumentation, fachliche Rücksprache und die Prüfung lokaler Verfahrenswege. Akute Gefahr verändert die Priorität: Schutz, Sicherheit, Leitungseinbindung und erforderliche Information haben Vorrang vor normaler Gesprächsführung.</div><button onclick=\"showSolution('s_start')\">Musterlösung anzeigen</button>\n<button class=\"primary\" onclick=\"completeCurrent(['t_start'])\">Abschnitt abschließen</button>`, "verfahrenslogik": `\n<section class=\"card\"><h2>Verfahrenslogik in Niedersachsen und im Emsland</h2><p>Dieses Modul ist auf <strong>Schulsozialarbeit im schulischen Kontext Niedersachsens</strong> ausgerichtet. In Niedersachsen ist die soziale Arbeit in schulischer Verantwortung ein schulisches Aufgabenfeld an der Schnittstelle zur Kinder- und Jugendhilfe. Im Emsland kommen regionale Kooperationswege, Meldebögen, Schutzkonzepte und Zuständigkeiten hinzu.</p><div class=\"note red\"><strong>Vorsicht:</strong> Dieses Modul ersetzt keine lokale Dienstanweisung, keine Rechtsberatung und keine Einzelfallentscheidung. Es vermittelt eine fachliche Grundlogik für sicheres Handeln und muss mit dem Schutzkonzept der jeweiligen Schule abgeglichen werden.</div><h3>7-Schritte-Vorgehen im Verdachtsfall</h3><ol><li><strong>Wahrnehmen:</strong> Was liegt konkret vor?</li><li><strong>Sichern:</strong> Was muss sachlich dokumentiert werden?</li><li><strong>Nicht allein entscheiden:</strong> Wer muss intern / fachlich einbezogen werden?</li><li><strong>Fachberatung nutzen:</strong> Ist eine insoweit erfahrene Fachkraft / Fachberatung erforderlich?</li><li><strong>Beteiligung prüfen:</strong> Wie wird das Kind beteiligt? Werden Eltern beteiligt oder wäre das riskant?</li><li><strong>Handeln:</strong> Welcher Schutz- oder Klärungsschritt ist verhältnismäßig?</li><li><strong>Nachhalten:</strong> Wurde überprüft, ob Schutz und Klärung tatsächlich verbessert wurden?</li></ol><div class=\"note blue\"><strong>Wissenschaftsbox:</strong> Professionelles Kinderschutzhandeln arbeitet nicht mit Bauchgefühl allein, sondern mit strukturierter Risiko- und Schutzfaktorensichtung, Mehr-Augen-Prinzip, Dokumentation, Beteiligung und reflektierter Machtverantwortung. Für Schulsozialarbeit ist zentral: Sie erkennt, sortiert, berät, beteiligt und aktiviert Verfahren. Sie ersetzt weder Jugendamt noch Polizei noch Schulpsychologie.</div><p><span class=\"badge\">Schutzauftrag</span><span class=\"badge\">Fachberatung</span><span class=\"badge\">Erforderlichkeit</span><span class=\"badge\">Beteiligung</span><span class=\"badge\">Dokumentation</span></p></section>\n<section class=\"card\"><h2>Regionale Prüfaufträge für das Emsland</h2><table><tr><th>Was muss vor einem Ernstfall geklärt sein?</th><th>Warum?</th></tr><tr><td>Welche schulinterne Kinderschutz- / Krisenstruktur gilt?</td><td>Damit nicht in der Akutsituation improvisiert wird.</td></tr><tr><td>Welche aktuelle Kooperationsvereinbarung Schule / Jugendhilfe gilt am Standort?</td><td>Damit Meldewege, Rollen und Dokumente bekannt sind.</td></tr><tr><td>Welche Formulare werden regional genutzt?</td><td>Im Emsland gibt es u. a. Meldebogen, Checklisten und Ablaufschemata. Es ist zu prüfen, welche Fassung an der Schule verbindlich ist.</td></tr><tr><td>Wer ist zuständig: Landkreis Emsland, ggf. eigener örtlicher Jugendhilfeträger, ASD / Fachdienst?</td><td>Zuständigkeit darf im Verdachtsfall nicht geraten werden.</td></tr><tr><td>Wie läuft die Rufbereitschaft / der Notfallweg?</td><td>Bei akuter Gefahr muss der Weg sofort bekannt sein.</td></tr></table></section>\n<div class=\"task\"><h3>Übertragen Sie die Verfahrenslogik auf Ihre Schule im Emsland: Welche fünf lokalen Klärungen wären vor einem Ernstfall wichtig?</h3><textarea id=\"t_verfahren\" rows=\"6\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_verfahren\" class=\"analysis\"></div></div>\n<button class=\"primary\" onclick=\"completeCurrent(['t_verfahren'])\">Abschnitt abschließen</button>`, "erste_sicherung": `\n<section class=\"card\"><h2>Erste Sicherung und Sofortklärung</h2><p>Nach einem belastenden Hinweis zählt zuerst Ruhe. Nicht Aktionismus, nicht Wegsehen.</p><table><tr><th>Fachlich sinnvoll</th><th>Riskant</th></tr><tr><td>Schutzbedarf prüfen</td><td>sofortige Elternkonfrontation ohne Abwägung</td></tr><tr><td>wörtliche Aussage notieren, soweit relevant</td><td>mehrfaches Detailnachfragen</td></tr><tr><td>eigene Beobachtungen sichern</td><td>Diagnosen oder Schuldzuweisungen formulieren</td></tr><tr><td>Rückspracheweg aktivieren</td><td>allein entscheiden</td></tr></table></section>\n<div class=\"task\"><h3>Erste Einordnung: Eine Schülerin sagt: „Ich habe Angst, heute nach Hause zu gehen.“</h3><select id=\"sel_akut\"><option value=\"\">Bitte auswählen</option><option value=\"Grün: normale Beratung reicht zunächst\">Grün: normale Beratung reicht zunächst</option><option value=\"Gelb: fachliche Klärung und Rücksprache erforderlich\">Gelb: fachliche Klärung und Rücksprache erforderlich</option><option value=\"Rot: mögliche akute Schutzlage prüfen\">Rot: mögliche akute Schutzlage prüfen</option></select><div id=\"analysis-sel_akut\" class=\"analysis\"></div></div>\n<div class=\"task\"><h3>Welche ersten drei Schritte wären fachlich angemessen? Begründen Sie ohne Panik und ohne Verharmlosung.</h3><textarea id=\"t_sicherung\" rows=\"5\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_sicherung\" class=\"analysis\"></div></div>\n<button class=\"primary\" onclick=\"completeCurrent(['sel_akut','t_sicherung'])\">Abschnitt abschließen</button>\n<section class=\"card\"><h2>Was jetzt nicht tun?</h2><div class=\"grid\"><div class=\"note red\"><strong>Nicht:</strong> Kind mehrfach befragen oder Details erzwingen.</div><div class=\"note red\"><strong>Nicht:</strong> Eltern vorschnell konfrontieren, wenn diese möglicherweise Gefährdungspersonen sind.</div><div class=\"note red\"><strong>Nicht:</strong> absolute Geheimhaltung zusagen.</div><div class=\"note red\"><strong>Nicht:</strong> digitale Bilder, Chats oder Beweise selbst sichern oder weiterleiten.</div><div class=\"note red\"><strong>Nicht:</strong> allein entscheiden, obwohl Fachberatung nötig ist.</div><div class=\"note red\"><strong>Nicht:</strong> wochenlang abwarten, wenn Schutzbedarf möglich ist.</div></div></section>\n<section class=\"card\"><h2>Entscheidungsmatrix</h2><table><tr><th>Lage</th><th>Beispiel</th><th>nächste fachliche Bewegung</th></tr><tr><td>Unklare Sorge</td><td>Kind wirkt seit Wochen verändert, aber ohne konkrete Aussage.</td><td>beobachtungsnah dokumentieren, Informationen sortieren, Rücksprache prüfen</td></tr><tr><td>Verdacht</td><td>Kind äußert konkrete Angst vor Heimweg oder berichtet belastend.</td><td>Schutzbedarf prüfen, Fachberatung / Leitung nach Verfahren einbeziehen</td></tr><tr><td>Gewichtige Anhaltspunkte</td><td>Hinweise wiederholen sich, Erklärungen widersprechen sich, Schutzfaktoren fehlen.</td><td>lokalen Kinderschutzweg aktivieren, erforderliche Information begrenzt weitergeben</td></tr><tr><td>Akute Gefahr</td><td>Suizidäußerung, konkrete Gewaltandrohung, unmittelbarer Schutzbedarf.</td><td>Sofortlogik, nicht allein lassen, Leitung / zuständige Stellen / Notfallweg</td></tr></table></section>`, "gespraech_kind": `\n<section class=\"card\"><h2>Gespräch mit dem Kind</h2><p>Das Gespräch dient nicht der Beweissicherung. Es dient Orientierung, Schutz, Beteiligung und der Klärung des nächsten verantwortbaren Schritts.</p><table><tr><th>Problematisch</th><th>Besser</th></tr><tr><td>„Hat dein Vater dich geschlagen?“</td><td>„Was ist passiert?“</td></tr><tr><td>„Du hast Angst vor deiner Mutter, oder?“</td><td>„Wie geht es dir, wenn du an zu Hause denkst?“</td></tr><tr><td>„Ich verspreche, niemand erfährt etwas.“</td><td>„Ich verspreche dir, dass ich nicht einfach über deinen Kopf hinweg handle. Wenn Schutz nötig ist, holen wir Unterstützung.“</td></tr></table></section>\n<div class=\"task\"><h3>Formulieren Sie einen kindgerechten Satz, wenn ein Kind absolute Geheimhaltung verlangt.</h3><textarea id=\"t_kind_satz\" rows=\"4\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_kind_satz\" class=\"analysis\"></div></div>\n<div class=\"task\"><h3>Formulieren Sie drei offene, nicht suggestive Fragen für ein erstes Gespräch.</h3><textarea id=\"t_kind_fragen\" rows=\"4\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_kind_fragen\" class=\"analysis\"></div></div>\n<button class=\"primary\" onclick=\"completeCurrent(['t_kind_satz','t_kind_fragen'])\">Abschnitt abschließen</button>\n<section class=\"card\"><h2>Beteiligung des Kindes im Verdachtsfall</h2><p>Das Kind wird nicht zum Beweismittel. Es wird ernst genommen, geschützt und altersangemessen beteiligt. Der Wille des Kindes ist wichtig, hebt Schutzpflichten aber nicht automatisch auf.</p><div class=\"note green\"><strong>Formulierungshilfe:</strong> „Ich nehme ernst, was du sagst. Ich werde jetzt nicht einfach irgendetwas über deinen Kopf hinweg machen. Ich muss mir aber fachliche Unterstützung holen, damit wir gut und sicher weiter vorgehen.“</div></section>`, "fachberatung": `\n<section class=\"card\"><h2>Fachberatung, Leitung und regionale Wege</h2><p>Niemand muss und niemand sollte einen Verdachtsfall allein tragen. Fachberatung dient der Einschätzung, der Verfahrenssicherheit und dem Schutz des Kindes sowie der Fachkraft. Im Emsland ist vor der Praxisanwendung zu prüfen, welche Ansprechwege, Meldebögen, Checklisten, Rufbereitschaftswege und Kooperationsvereinbarungen am eigenen Schulstandort aktuell gelten.</p><table><tr><th>Situation</th><th>Einbindung</th></tr><tr><td>unklare Sorge</td><td>kollegiale Beratung, ggf. Leitung nach lokalem Verfahren</td></tr><tr><td>mögliche gewichtige Anhaltspunkte</td><td>Fachberatung / insoweit erfahrene Fachkraft prüfen</td></tr><tr><td>akute Gefahr</td><td>Schulleitung, zuständige Schutzwege, ggf. Notfallstellen</td></tr><tr><td>eigene Unsicherheit</td><td>Rücksprache statt Alleinentscheidung</td></tr></table></section>\n<section class=\"card\"><h2>Vorbereitung einer Fachberatung</h2><table><tr><th>Frage</th><th>Notiz</th></tr><tr><td>Was ist der Anlass?</td><td>konkrete Situation, Datum, Beteiligte</td></tr><tr><td>Was wurde beobachtet?</td><td>nur beobachtbare Tatsachen</td></tr><tr><td>Was hat das Kind wörtlich gesagt?</td><td>möglichst wortnah, ohne Umdeutung</td></tr><tr><td>Was ist Interpretation?</td><td>klar getrennt von Beobachtung</td></tr><tr><td>Welche Risiken und Schutzfaktoren gibt es?</td><td>nicht nur Defizite sammeln</td></tr><tr><td>Was wurde bereits getan?</td><td>Gespräche, Rücksprachen, Maßnahmen</td></tr><tr><td>Welche konkrete Frage soll die Fachberatung klären?</td><td>z. B. Elternkontakt, Gefährdungslage, nächster Schritt</td></tr></table></section>\n<section class=\"card\"><h2>Simulation: Telefonische Fachberatung vorbereiten</h2><p>Im Verdachtsfall ist eine Fachberatung nur dann hilfreich, wenn die Anfrage kurz, sachlich und sortiert erfolgt. Für Niedersachsen/Emsland gilt: keine dramatisierende Bewertung, keine ungeprüfte Detailweitergabe, sondern strukturierte Schilderung mit konkreter Beratungsfrage und Hinweis auf den lokalen Verfahrensstand.</p><ol><li>Anlass und aktueller Schutzbedarf</li><li>gesicherte Beobachtungen und wörtliche Aussagen</li><li>Interpretationen klar getrennt</li><li>Schutzfaktoren und Risiken</li><li>bisherige Schritte</li><li>konkrete Beratungsfrage</li><li>Prüfung: schulischer Verfahrensweg / Emsland-Unterlagen / zuständige Ansprechwege</li></ol></section>\n<div class=\"task\"><h3>Simulation Fachberatung: Formulieren Sie eine knappe telefonische Fallvorstellung mit konkreter Beratungsfrage. Vermeiden Sie Bewertungen und nennen Sie, welche lokalen Emsland-Unterlagen oder Zuständigkeiten noch geprüft werden müssen.</h3><textarea id=\"t_fachberatung_sim\" rows=\"8\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_fachberatung_sim\" class=\"analysis\"></div></div>\n<div class=\"task\"><h3>Beschreiben Sie, wie Sie eine Fachberatung im Emsland vorbereitet anfragen würden. Benennen Sie Anlass, gesicherte Hinweise, offene Fragen, Schutzfaktoren, Verfahrensfrage und Zuständigkeitsprüfung.</h3><textarea id=\"t_fachberatung\" rows=\"7\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_fachberatung\" class=\"analysis\"></div></div>\n<button class=\"primary\" onclick=\"completeCurrent(['t_fachberatung_sim','t_fachberatung'])\">Abschnitt abschließen</button>`, "eltern": `\n<section class=\"card\"><h2>Elternbeteiligung abwägen</h2><p>Elternbeteiligung ist im Kinderschutz bedeutsam, aber nicht mechanisch. Sie darf den Schutz des Kindes nicht gefährden.</p><table><tr><th>Lage</th><th>Leitlinie</th></tr><tr><td>allgemeine Sorge / Unterstützungsbedarf</td><td>Transparenz und Einbeziehung meist sinnvoll</td></tr><tr><td>unklare Hinweise</td><td>vorher sortieren und ggf. beraten</td></tr><tr><td>Eltern könnten Gefährdungspersonen sein</td><td>keine vorschnelle Konfrontation</td></tr><tr><td>akute Gefahr</td><td>Schutzweg hat Vorrang</td></tr></table></section>\n<div class=\"task\"><h3>Fall: Ein Kind berichtet Gewalt durch eine sorgeberechtigte Person. Was ist der beste erste Grundsatz?</h3><select id=\"sel_eltern\"><option value=\"\">Bitte auswählen</option><option value=\"Eltern sofort konfrontieren\">Eltern sofort konfrontieren</option><option value=\"Zunächst fachlich beraten und Schutzrisiko prüfen\">Zunächst fachlich beraten und Schutzrisiko prüfen</option><option value=\"Nichts tun, weil es vertraulich ist\">Nichts tun, weil es vertraulich ist</option><option value=\"Die Klasse befragen\">Die Klasse befragen</option></select><div id=\"analysis-sel_eltern\" class=\"analysis\"></div></div>\n<div class=\"task\"><h3>Formulieren Sie eine fachliche Begründung, warum Elternbeteiligung manchmal zunächst zurückgestellt werden kann.</h3><textarea id=\"t_eltern\" rows=\"5\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_eltern\" class=\"analysis\"></div></div>\n<button class=\"primary\" onclick=\"completeCurrent(['sel_eltern','t_eltern'])\">Abschnitt abschließen</button>\n<section class=\"card\"><h2>Entscheidungsbaum Elternbeteiligung</h2><ol><li>Sind Eltern in diesem Fall mögliche Schutzpersonen?</li><li>Sind Eltern mögliche Gefährdungspersonen?</li><li>Könnte ein Elternkontakt die Lage des Kindes verschlechtern?</li><li>Ist vor einem Elternkontakt Fachberatung erforderlich?</li><li>Welche Information ist erforderlich und welche nicht?</li><li>Wer entscheidet nach lokalem Verfahren mit?</li><li>Wie wird die Entscheidung dokumentiert?</li></ol></section>`, "akut": `\n<section class=\"card\"><h2>Akute Gefahr und Schutzhandeln</h2><div class=\"note red\"><strong>Keine normale Gesprächssituation mehr:</strong> konkrete Gewaltandrohung, akute Selbst- oder Fremdgefährdung, unmittelbare Schutzbedürftigkeit, blockierter Ausgang, Ankündigung eigenmächtigen Handelns in der Klasse, Suizidäußerung oder Verdacht auf aktuelle Misshandlung.</div><p>Dann geht es nicht mehr primär um Beratung, sondern um Schutz, Sicherheit, Zuständigkeit und dokumentiertes Vorgehen.</p></section>\n<div class=\"task\"><h3>Ein Schüler sagt: „Ich gehe heute nach Hause und bringe mich um.“</h3><select id=\"sel_rot\"><option value=\"\">Bitte auswählen</option><option value=\"Grün\">Grün</option><option value=\"Gelb\">Gelb</option><option value=\"Rot\">Rot</option></select><div id=\"analysis-sel_rot\" class=\"analysis\"></div></div>\n<div class=\"task\"><h3>Welche Sofortlogik gilt bei einer roten Lage? Nennen Sie Schutz, Zuständigkeit, Information und Dokumentation.</h3><textarea id=\"t_akut\" rows=\"5\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_akut\" class=\"analysis\"></div></div>\n<button class=\"primary\" onclick=\"completeCurrent(['sel_rot','t_akut'])\">Abschnitt abschließen</button>\n<section class=\"card\"><h2>Notfallkarte akute Gefahr</h2><ol><li>Kind nicht allein lassen, wenn unmittelbarer Schutzbedarf besteht.</li><li>Schulleitung / zuständige Person nach schulischem Verfahren informieren.</li><li>Keine alleinige Abwägung im stillen Büro.</li><li>Zuständige Stellen / Notfallwege prüfen. Im Emsland sind die jeweils aktuell regional festgelegten Bereitschafts- und Meldestrukturen maßgeblich; konkrete Telefonnummern und Zuständigkeiten müssen am Schulstandort aktuell geprüft werden.</li><li>Nur erforderliche Informationen weitergeben.</li><li>Vorgang sachlich dokumentieren.</li><li>Nachsorge und weitere Begleitung klären.</li></ol><div class=\"note red\"><strong>Akute Gefahr ist keine normale Beratungssituation.</strong> Bei akuter Selbst- oder Fremdgefährdung, konkreter Gewaltandrohung oder unmittelbarer Gefahr können neben Schulleitung und Jugendhilfe auch Notfallwege relevant werden.</div></section>`, "dokumentation": `\n<section class=\"card\"><h2>Dokumentation und Informationsweitergabe</h2><p>Dokumentation muss sachlich, zeitnah und überprüfbar sein. Sie trennt Beobachtung, Aussage, Interpretation und Entscheidung.</p><table><tr><th>schlecht</th><th>besser</th></tr><tr><td>„Familie kaputt.“</td><td>„Mutter erschien zum Termin nicht. Telefonisch nicht erreichbar. Kind sagte: ‚Zu Hause war keiner.‘“</td></tr><tr><td>„Kind wird geschlagen.“</td><td>„Kind sagte wörtlich: ‚Papa hat mich am Arm gepackt.‘ Sichtbarer blauer Fleck am rechten Oberarm.“</td></tr><tr><td>„Eltern lügen.“</td><td>„Angaben der Eltern unterscheiden sich zwischen Gespräch vom 10.06. und 12.06.“</td></tr></table></section>\n<div class=\"task\"><h3>Schreiben Sie eine schlechte Bewertung in eine sachliche Kinderschutzdokumentation um: „Die Mutter ist völlig überfordert und das Kind verwahrlost.“</h3><textarea id=\"t_doku\" rows=\"4\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_doku\" class=\"analysis\"></div></div>\n<div class=\"task\"><h3>Welche Informationen würden Sie im Verfahren weitergeben, welche nicht? Begründen Sie mit Erforderlichkeit.</h3><textarea id=\"t_info\" rows=\"5\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_info\" class=\"analysis\"></div></div>\n<section class=\"card\"><h2>Verlaufsdokumentation</h2><p>Verdachtsfälle entwickeln sich. Deshalb braucht es nicht nur einen Erstbogen, sondern nachvollziehbare Verlaufseinträge.</p><table><tr><th>Datum / Uhrzeit</th><th>Beobachtung / Information</th><th>Einordnung</th><th>Rücksprache</th><th>Entscheidung</th><th>Nächster Schritt</th></tr><tr><td>...</td><td>...</td><td>...</td><td>...</td><td>...</td><td>...</td></tr></table></section>\n<div class=\"task\"><h3>Erstellen Sie einen ersten Verlaufseintrag für den Fall Jonas. Trennen Sie Beobachtung, Aussage, Einordnung, Rücksprache und nächsten Schritt.</h3><textarea id=\"t_verlauf\" rows=\"6\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_verlauf\" class=\"analysis\"></div></div>\n<section class=\"card\"><h2>Datenschutz und digitale Ablage im Verdachtsfall</h2><p>Gerade im Emsland-Schulalltag mit IServ, Mail, Telefonketten und schnellen Absprachen gilt: Kinderschutzdaten gehören nicht auf private Geräte, nicht in private Clouds, nicht in Messengergruppen und nicht in ungesicherte Verteiler. Sensible Bilder, Chatverläufe oder intime Dateien werden durch Schule nicht gesammelt, weitergeleitet oder ausgewertet. Maßgeblich sind die schulischen Dokumentationsorte, Datenschutzvorgaben und lokalen Verfahrenswege.</p><table><tr><th>Riskant</th><th>Fachlich sauberer</th></tr><tr><td>Notizen privat auf dem Handy speichern</td><td>nach lokalem Verfahren sachlich dokumentieren</td></tr><tr><td>Falldetails per WhatsApp-Gruppe klären</td><td>zuständige Personen über geschützte Wege einbeziehen</td></tr><tr><td>Chatbilder weiterleiten</td><td>nicht eigenständig sichern oder verbreiten, Fachberatung/Verfahrensweg klären</td></tr><tr><td>großer Mailverteiler mit Details</td><td>erforderliche Informationen begrenzt und adressatengerecht weitergeben</td></tr></table></section>\n<div class=\"task\"><h3>Beschreiben Sie, wie Sie Dokumentation und digitale Ablage im Verdachtsfall datenschutzsensibel organisieren. Beziehen Sie private Geräte, Messenger, Mailverteiler, Bilder/Chats und den lokalen schulischen Dokumentationsort ein.</h3><textarea id=\"t_digitale_ablage\" rows=\"7\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_digitale_ablage\" class=\"analysis\"></div></div>\n<button class=\"primary\" onclick=\"completeCurrent(['t_doku','t_info','t_verlauf','t_digitale_ablage'])\">Abschnitt abschließen</button>`, "fallwerkstatt": `\n<section class=\"card\"><h2>Fallwerkstatt: Jonas und Mira</h2><p><strong>Jonas, Klasse 3:</strong> wiederholt müde, zweimal ohne Frühstück, blauer Fleck am Oberarm, sagt leise: „Papa ist ausgerastet.“<br><strong>Mira, Klasse 8:</strong> ältere Kontaktperson fordert intime Bilder, droht mit Veröffentlichung, Mira bittet um absolute Geheimhaltung.</p></section>\n<section class=\"card\"><h2>Fall Jonas über mehrere Tage</h2><table><tr><th>Tag</th><th>Information</th><th>Fachliche Bedeutung</th></tr><tr><td>Montag</td><td>Jonas schläft in der zweiten Stunde ein und sagt: „Zu Hause war Stress.“</td><td>noch unklare Sorge, dokumentieren und beobachten</td></tr><tr><td>Dienstag</td><td>Lehrkraft berichtet: Jonas hatte erneut kein Frühstück und wirkt schreckhaft.</td><td>Hinweise verdichten sich, Rücksprache wird relevanter</td></tr><tr><td>Mittwoch</td><td>Jonas sagt leise: „Papa ist ausgerastet. Ich will nicht nach Hause.“</td><td>Verdacht / mögliche akute Schutzfrage prüfen</td></tr></table></section>\n<div class=\"task\"><h3>Bearbeiten Sie Jonas: gesicherte Hinweise, fehlende Informationen, Schutzfaktoren, Risikoampel, Fachberatung, Elternbeteiligung und nächster Schritt.</h3><textarea id=\"t_jonas\" rows=\"8\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_jonas\" class=\"analysis\"></div></div>\n<div class=\"task\"><h3>Bearbeiten Sie Mira: digitale Gefährdung, Gesprächsgrenzen, Schutzschritt, keine eigenständige Beweissicherung, Kindeswille und Beteiligung.</h3><textarea id=\"t_mira\" rows=\"8\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_mira\" class=\"analysis\"></div></div>\n<div class=\"task\"><h3>Entscheidungspunkt: Was verändert sich zwischen Montag und Mittwoch im Fall Jonas? Begründen Sie anhand der Verdichtung.</h3><textarea id=\"t_jonas_verlauf\" rows=\"6\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_jonas_verlauf\" class=\"analysis\"></div></div>\n<button class=\"primary\" onclick=\"completeCurrent(['t_jonas','t_mira','t_jonas_verlauf'])\">Abschnitt abschließen</button>`, "fehler": `\n<section class=\"card\"><h2>Fehlerwerkstatt Vorgehen</h2><table><tr><th>Fehler</th><th>Risiko</th><th>Fachlich bessere Alternative</th></tr><tr><td>„Ich verspreche absolute Geheimhaltung.“</td><td>Schutzhandlung wird erschwert.</td><td>Transparenz über Grenzen von Vertraulichkeit: Schutz hat Vorrang.</td></tr><tr><td>„Ich frage so lange nach, bis ich weiß, was passiert ist.“</td><td>Suggestion und Belastung.</td><td>Offen zuhören, wenige Klärungsfragen, keine Ermittlungsbefragung.</td></tr><tr><td>„Ich rufe sofort die Eltern an und konfrontiere sie.“</td><td>mögliche Gefährdung des Kindes.</td><td>Elternbeteiligung vorher fachlich und risikobezogen abwägen.</td></tr><tr><td>„Ich sichere die Chatbilder selbst.“</td><td>Datenschutz-, Strafbarkeits- und Beweissicherungsprobleme.</td><td>Keine eigene Beweissicherung. Schutzweg, Fachberatung und zuständige Stellen klären.</td></tr><tr><td>„Ich entscheide allein.“</td><td>fachlich und verfahrensbezogen riskant.</td><td>Schulischen Verfahrensweg, Leitung und Fachberatung nutzen.</td></tr><tr><td>„Ich nehme einfach den alten Meldebogen aus dem Vorjahr.“</td><td>veralteter oder falscher Verfahrensweg.</td><td>Aktuelle schulische und regionale Vorlage prüfen.</td></tr><tr><td>„Ich frage in der WhatsApp-Gruppe nach, wer zuständig ist.“</td><td>Datenschutz- und Vertraulichkeitsrisiko.</td><td>Zuständigkeit über freigegebene Dienstwege klären.</td></tr><tr><td>„Ich speichere meine Notizen privat, damit ich sie wiederfinde.“</td><td>unzulässige oder unsichere Ablage sensibler Daten.</td><td>Sicheren schulischen Dokumentationsort verwenden.</td></tr><tr><td>„Die Klassenleitung meldet das schon.“</td><td>unklare Verantwortung und fehlendes Nachhalten.</td><td>Verantwortung, Rückmeldung und nächsten Schritt ausdrücklich klären.</td></tr></table></section>\n<section class=\"card\"><h2>Fehlerwerkstatt regionaler Bezug Emsland</h2><p>Regionale Materialien sind hilfreich, aber nur wenn sie aktuell, zuständig und schulisch freigegeben sind. Das Modul darf deshalb keine konkrete Telefonnummer oder Dienstanweisung ersetzen. Die Lernaufgabe ist, die lokalen Wege am eigenen Standort aktiv zu prüfen.</p></section>\n<div class=\"task\"><h3>Wählen Sie zwei regionale Fehler aus: alter Meldebogen, unklarer ASD-/Jugendhilfeweg, Messengergruppe, private Notizen, ungeprüfte Zuständigkeit. Formulieren Sie jeweils eine fachlich saubere Alternative für eine Schule im Emsland.</h3><textarea id=\"t_fehler_regional\" rows=\"7\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_fehler_regional\" class=\"analysis\"></div></div>\n<div class=\"task\"><h3>Wählen Sie zwei Fehler aus der Tabelle und formulieren Sie jeweils eine fachlich bessere Alternative.</h3><textarea id=\"t_fehler\" rows=\"6\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_fehler\" class=\"analysis\"></div></div>\n<button class=\"primary\" onclick=\"completeCurrent(['t_fehler_regional','t_fehler'])\">Abschnitt abschließen</button>`, "praxis": `\n<section class=\"card\"><h2>Praxisformular Verdachtsfall</h2><p>Nutzen Sie diesen Bogen als Lern- und Reflexionsstruktur. In der Praxis sind die lokalen Formulare und Dienstwege maßgeblich. Für Schulen im Emsland sollte geprüft werden, welche aktuelle Kooperationsvereinbarung, welcher Meldebogen und welches Ablaufschema vor Ort verbindlich verwendet werden.</p></section>\n\n<section class=\"card\"><h2>Lokaler Verfahrenscheck Emsland / eigene Schule</h2><p>Der Emsland-Fokus bedeutet nicht, dass eine allgemeine Internetinformation automatisch für jede Schule verbindlich ist. Für die Praxis muss am Standort geprüft werden, welche aktuelle Kooperationsvereinbarung, welcher Meldebogen, welches Ablaufschema, welche Vertretungsregelung und welcher Notfallweg gelten.</p><table><tr><th>Prüfpunkt</th><th>Was muss vor Ort geklärt werden?</th></tr><tr><td>Schutzkonzept</td><td>Gibt es ein aktuelles schulisches Schutzkonzept und wo liegt es?</td></tr><tr><td>Interne Ansprechperson</td><td>Wer ist zuständig, wer ist Vertretung?</td></tr><tr><td>Jugendhilfeweg / ASD / Fachdienst</td><td>Welcher Weg gilt für die Schule und den Wohnort des Kindes?</td></tr><tr><td>Meldebogen / Checkliste</td><td>Welche aktuelle Vorlage wird verwendet?</td></tr><tr><td>Notfallweg außerhalb der Schulzeit</td><td>Wie ist Rufbereitschaft / Notfallkontakt dokumentiert?</td></tr><tr><td>Dokumentationsort</td><td>Wo werden sensible Unterlagen sicher abgelegt?</td></tr></table></section>\n<div class=\"task\"><h3>Lokaler Verfahrenscheck: Tragen Sie ein, was an Ihrer Schule im Emsland konkret geprüft werden muss: Schutzkonzept, interne Ansprechperson, Vertretung, Jugendhilfeweg/ASD, Meldebogen, Notfallweg, Dokumentationsort und Datum der letzten Prüfung.</h3><textarea id=\"t_lokalcheck\" rows=\"10\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_lokalcheck\" class=\"analysis\"></div></div>\n<div class=\"printbox\"><h3>Praxisformular: Lokaler Verfahrenscheck Emsland / Schule</h3><p><strong>Schule:</strong> ____________________________</p><p><strong>Stand Schutzkonzept:</strong> ____________________________</p><p><strong>Interne Ansprechperson / Vertretung:</strong> ____________________________</p><p><strong>Zuständiger Jugendhilfeweg / ASD / Fachdienst:</strong> ____________________________</p><p><strong>Meldebogen / Checkliste / Ablaufschema liegt hier:</strong> ____________________________</p><p><strong>Notfallweg / Rufbereitschaft:</strong> ____________________________</p><p><strong>Datenschutz-/Dokumentationsort:</strong> ____________________________</p><p><strong>Datum der letzten Prüfung:</strong> ____________________________</p></div>\n<div class=\"task\"><h3>Verdachtsfall-Ablaufbogen: Anlass, gesicherte Hinweise, Aussagen, fehlende Informationen, Schutzfaktoren, Risikoampel, Rücksprache, Elternbeteiligung, Emsland-Verfahrensweg, nächster Schritt, Dokumentation.</h3><textarea id=\"t_bogen\" rows=\"11\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_bogen\" class=\"analysis\"></div></div>\n<div class=\"printbox\"><h3>Druckbarer Kurzablauf Niedersachsen / Emsland</h3><ol><li>Ruhe bewahren und Schutzbedarf prüfen.</li><li>Beobachtungen und wörtliche Aussagen sachlich sichern.</li><li>Nicht suggestiv befragen.</li><li>Keine vorschnelle Elternkonfrontation bei möglichem Risiko.</li><li>Schulische Leitung / Fachberatung nach lokalem Verfahren einbeziehen.</li><li>Für das Emsland: aktuelle Kooperationsvereinbarung, Meldebogen, Checkliste und Bereitschaftswege am Schulstandort prüfen.</li><li>Erforderliche Informationen begrenzt weitergeben.</li><li>Nächsten Schritt dokumentieren und überprüfen.</li></ol></div>\n<section class=\"card\"><h2>Quellen- und Prüfhinweis</h2><p>Die fachliche Grundlogik orientiert sich an den bundesrechtlichen Regelungen zu Schutzauftrag und Beratung sowie an niedersächsischen Vorgaben zur Sozialen Arbeit in schulischer Verantwortung. Regionale Angaben zum Emsland müssen vor der Praxisanwendung mit den aktuellen Veröffentlichungen und schulischen Vereinbarungen abgeglichen werden.</p></section>\n<button class=\"primary\" onclick=\"completeCurrent(['t_lokalcheck','t_bogen'])\">Abschnitt abschließen</button>`, "abschluss": `\n<section class=\"card\"><h2>Gelingensnachweis</h2><p>Der Abschluss kombiniert Faktenwissen, Fallverstehen und transferfähiges Handeln. Damit ist das Modul nicht nur eine Klickstrecke, sondern eine überprüfbare Lernleistung.</p><div id=\"quiz\"></div><button onclick=\"gradeQuiz()\">Quiz auswerten</button><div id=\"quizResult\" class=\"result\"></div></section>\n<div class=\"task\"><h3>Transferauftrag: Bearbeiten Sie einen Verdachtsfall aus Schule, Praktikum oder aus den Fallbeispielen. Beschreiben Sie Anlass, gesicherte Hinweise, fehlende Informationen, Schutzfaktoren, Kindeswille, Risikoampel, Fachberatung, Elternbeteiligung, Datenschutz, Dokumentation, Emsland-Verfahrensweg, lokalen Verfahrenscheck, Vorbereitung einer Fachberatung, Datenschutz/digitale Ablage und nächsten überprüfbaren Schritt. Mindestlänge: 2000 Zeichen.</h3><textarea id=\"t_transfer\" rows=\"14\" placeholder=\"Ihre fachliche Antwort...\"></textarea><div id=\"analysis-t_transfer\" class=\"analysis\"></div></div>\n<section class=\"card\"><h2>Bewertungsraster Transferauftrag</h2><table class=\"rubric\"><tr><th>Kriterium</th><th>Basiskompetenz</th><th>Hochschulniveau</th></tr><tr><td>Fachliche Einordnung</td><td>Verdacht, Sorge und akute Gefahr werden unterschieden.</td><td>Die Einordnung wird begründet, mit Schutz- und Risikofaktoren abgewogen und mit Verfahrenslogik verknüpft.</td></tr><tr><td>Rollenklärung</td><td>Schulsozialarbeit wird nicht als Ermittlungsinstanz verstanden.</td><td>Abgrenzung zu Lehrkräften, Jugendhilfe, Schulpsychologie und Polizei wird fallbezogen erläutert.</td></tr><tr><td>Kindesbeteiligung</td><td>Das Kind wird ernst genommen.</td><td>Transparenz, Schutz, Kindeswille und Grenzen von Vertraulichkeit werden sprachlich sauber umgesetzt.</td></tr><tr><td>Dokumentation/Datenschutz</td><td>Wichtige Informationen werden sachlich dokumentiert.</td><td>Beobachtung, Aussage, Interpretation, Entscheidung, Erforderlichkeit und digitale Ablage werden klar getrennt.</td></tr><tr><td>Regionale Umsetzung</td><td>Lokaler Verfahrensweg wird erwähnt.</td><td>Schutzkonzept, Meldebogen, Zuständigkeit, Notfallweg, Dokumentationsort und Prüfdatum werden konkret benannt.</td></tr></table></section><section class=\"card\"><h2>Literatur und Quellenhinweise</h2><ul class=\"source-list\"><li>Niedersächsisches Kultusministerium: Erlass und Konzept „Soziale Arbeit in schulischer Verantwortung“.</li><li>SGB VIII: § 8a Schutzauftrag bei Kindeswohlgefährdung und § 8b fachliche Beratung.</li><li>KKG: Beratung und Übermittlung von Informationen durch Berufsgeheimnisträger bei Kindeswohlgefährdung.</li><li>DBSH: Berufsethik und berufsethische Prinzipien Sozialer Arbeit.</li><li>Landkreis Emsland: Kooperation im Kinderschutz, Meldebogen und Ablaufschema bei Verdacht auf Kindeswohlgefährdung. Stand der lokalen Unterlagen vor Nutzung prüfen.</li><li>Empfohlene Vertiefung: Kindler, Lillig, Blüml, Meysen & Werner: Handbuch Kindeswohlgefährdung; Galuske: Methoden der Sozialen Arbeit; Thiersch: Lebensweltorientierte Soziale Arbeit; DBSH-Fachpublikationen zu professioneller Haltung und Ethik.</li></ul><p class=\"small\">Hinweis: Literaturhinweise dienen der hochschuldidaktischen Einordnung. Rechtliche und regionale Verfahrensangaben müssen regelmäßig gegen aktuelle amtliche Fassungen und schulinterne Vorgaben geprüft werden.</p></section><div class=\"card\"><h2>Kompetenz-Ampel</h2><div id=\"competence\"></div></div><div id=\"certificate\" class=\"certificate hidden\"><h2>Abschlussnachweis</h2><p>Band 4, Modul 3 wurde erfolgreich abgeschlossen.</p><p><strong>Name:</strong> <span id=\"certName\">Teilnehmende Person</span></p><p><strong>Datum:</strong> <span id=\"certDate\"></span></p></div><button onclick=\"finalize()\" class=\"primary\">Abschluss prüfen und Zertifikat anzeigen</button><button onclick=\"sendToSheets()\">An Google Sheets senden</button><button onclick=\"exportData()\">Lerndaten exportieren</button><div id=\"sendResult\" class=\"result hidden\"></div><button onclick=\"window.print()\">Drucken / PDF</button>`};
let state = JSON.parse(localStorage.getItem(MODULE_ID) || '{}');
state.done = state.done || {}; state.answers = state.answers || {}; state.quiz = state.quiz || {}; state.analysis = state.analysis || {}; state.current = state.current || 0; state.quizPassed = state.quizPassed || false; state.answers.userName = state.answers.userName || state.answers.name || ''; state.answers.userEmail = state.answers.userEmail || state.answers.email || '';
function save(){localStorage.setItem(MODULE_ID, JSON.stringify(state));}
function isOpen(i){return i===0 || state.done[SECTIONS[i-1].id];}
function renderNav(){const nav=document.getElementById('nav');nav.innerHTML='';SECTIONS.forEach((s,i)=>{const b=document.createElement('button');b.className='navitem '+(state.done[s.id]?'done ':'')+(i===state.current?'current ':'')+(!isOpen(i)?'locked':'');b.innerHTML=(state.done[s.id]?'✓ ':'')+(i+1)+'. '+s.title;b.onclick=()=>{if(isOpen(i)){state.current=i;save();render();}else alert('Dieser Abschnitt wird nach Abschluss des vorherigen Abschnitts freigeschaltet.');};nav.appendChild(b);});}
function render(){renderNav();const s=SECTIONS[state.current];document.getElementById('main').innerHTML=SECTION_HTML[s.id] || '<div class="card">Abschnitt fehlt.</div>';wireInputs();if(s.id==='abschluss'){ renderQuiz(); updateCompetence(); } updateProgress();}
function wireInputs(){document.querySelectorAll('textarea,input[type=text],input[type=email],select').forEach(el=>{if(state.answers[el.id]) el.value=state.answers[el.id]; el.addEventListener('input',()=>{state.answers[el.id]=el.value; analyzeAll(); save();}); el.addEventListener('change',()=>{state.answers[el.id]=el.value; analyzeAll(); save();});}); analyzeAll();}
function completeCurrent(required=[]){let missing=[];required.forEach(id=>{const el=document.getElementById(id);const v=(state.answers[id] || (el?el.value:'' ) || '').trim(); const min=(el && el.tagName==='SELECT')?1:8; if(v.length<min) missing.push(id);}); if(missing.length){alert('Bitte bearbeiten Sie zuerst die Pflichtaufgabe. Auswahlfelder benötigen eine Auswahl, Freitextfelder eine kurze Bearbeitung.');return;} state.done[SECTIONS[state.current].id]=true; if(state.current<SECTIONS.length-1) state.current++; save(); render(); window.scrollTo({top:0,behavior:'smooth'});}

function analyzeText(value){const text=(value||'').toLowerCase();let warnings=[], positives=[];const warn=[['absolute Geheimhaltung','niemand erfährt|alles geheim|bleibt unter uns|verspreche.*niemand'],['Suggestion','hat.*geschlagen|war es dein vater|du hast angst.*oder|stimmt es dass|war.*wieder'],['Alleinentscheidung','ich entscheide allein|ohne rücksprache|ich kläre das alleine'],['vorschnelle Konfrontation','eltern sofort konfrontieren|zur rede stellen|sofort die eltern anrufen'],['Beweissicherung durch Schule','beweise sichern|bilder weiterleiten|chat auswerten|screenshots sammeln|chatbilder sammeln|bilder auswerten'],['unscharfe Bewertung','verwahrlost|kaputte familie|eltern unfähig|lügt|asozial'],['Datenschutzfehler','alles weitergeben|alle details|namen weitergeben|vollständig informieren|whatsapp|private cloud|privates handy|privat speichern|mailverteiler'],['Verharmlosung','erstmal abwarten|nicht so schlimm|übertreibt|nur pubertät'],['regionaler Verfahrensfehler','alter meldebogen|vorjahr|ungeprüft|irgendwen im jugendamt|klassenleitung meldet das schon']];const pos=[['Schutzlogik','schutz|sicherheit|akut|gefährdung|notfall'],['Fachberatung','fachberatung|insoweit erfahrene|rücksprache|kollegial|leitung'],['Dokumentation','dokumentation|datum|uhrzeit|wörtlich|beobachtung|aussage'],['Erforderlichkeit','erforderlich|notwendig|begrenzt|datenschutz|schweigepflicht'],['Beteiligung','transparent|beteiligen|kindeswille|nicht über den kopf'],['Elternabwägung','elternbeteiligung|konfrontation|gefährdungsperson|abwägen'],['nicht suggestiv','offene frage|nicht suggestiv|was ist passiert'],['lokaler Verfahrenscheck','schutzkonzept|meldebogen|checkliste|ablaufschema|asd|jugendhilfeweg|notfallweg|rufbereitschaft|dokumentationsort'],['digitale Ablage','iserv|private geräte|messenger|mailverteiler|ablage|datenschutzsensibel']];warn.forEach(r=>{if(new RegExp(r[1]).test(text)) warnings.push(r[0]);});pos.forEach(r=>{if(new RegExp(r[1]).test(text)) positives.push(r[0]);});return {warnings,positives};}
function analyzeAll(){document.querySelectorAll('textarea').forEach(el=>{const box=document.getElementById('analysis-'+el.id);if(!box)return;const a=analyzeText(el.value);state.analysis[el.id]=a;if(!el.value.trim()){box.className='analysis';box.innerHTML='';return;} if(a.warnings.length){box.className='analysis warn';box.innerHTML='<strong>Prüfhinweis:</strong> '+a.warnings.join(', ')+'<br><span>Überarbeiten Sie die Formulierung fachlich vorsichtig.</span>';} else {box.className='analysis good';box.innerHTML='<strong>Fachliche Marker erkannt:</strong> '+(a.positives.length?a.positives.join(', '):'keine problematischen Warnmuster, bitte trotzdem fachlich prüfen.');}});}
function renderQuiz(){const q=document.getElementById('quiz'); if(!q)return; q.innerHTML=''; QUIZ.forEach((item,i)=>{const div=document.createElement('div');div.className='quizitem';div.innerHTML='<strong>'+(i+1)+'. '+item.q+'</strong>'+item.options.map((o,j)=>'<label><input type="radio" name="q'+i+'" value="'+j+'" '+(state.quiz[i]==j?'checked':'')+'> '+o+'</label>').join('');q.appendChild(div);});document.querySelectorAll('#quiz input').forEach(inp=>inp.addEventListener('change',e=>{state.quiz[e.target.name.replace('q','')]=Number(e.target.value);save();}));}
function gradeQuiz(){let correct=0;QUIZ.forEach((q,i)=>{if(Number(state.quiz[i])===q.correct)correct++;});const pct=Math.round(correct/QUIZ.length*100);state.quizPassed=pct>=80;save();document.getElementById('quizResult').innerHTML='<strong>'+correct+' von '+QUIZ.length+' richtig ('+pct+' %).</strong> '+(state.quizPassed?'Bestanden.':'Noch nicht bestanden. 80 % sind erforderlich.');updateCompetence();}
function updateCompetence(){const el=document.getElementById('competence'); if(!el)return; const joined=Object.values(state.answers).join(' ').toLowerCase(); const rows=[['Schutzlogik','schutz|sicherheit|akut|gefährdung'],['Fachberatung','fachberatung|rücksprache|leitung|insoweit'],['Dokumentation','dokumentation|beobachtung|aussage|datum|uhrzeit|verlauf'],['Datenschutz','erforderlich|datenschutz|schweigepflicht|begrenzt'],['Elternabwägung','elternbeteiligung|konfrontation|abwägen|gefährdungsperson'],['Kindesbeteiligung','kindeswille|transparent|nicht über den kopf|beteiligen'],['Emsland-Verfahrensweg','emsland|landkreis|meldebogen|checkliste|kooperationsvereinbarung|rufbereitschaft|jugendamt|asd|schutzkonzept|notfallweg'],['Fachberatungsvorbereitung','anlass|wörtliche aussage|schutzfaktoren|risiken|beratungsfrage'],['Datenschutz/digitale Ablage','privat|messenger|mailverteiler|ablage|dokumentationsort|erforderlich'],['Nachhalten','nachhalten|überprüfen|verlauf|nächster schritt']]; el.innerHTML='<table><tr><th>Kompetenz</th><th>Status</th></tr>'+rows.map(r=>'<tr><td>'+r[0]+'</td><td>'+(new RegExp(r[1]).test(joined)?'🟢 erkennbar':'🟡 weiter ausbauen')+'</td></tr>').join('')+'</table>';}

function getUserIdentity(){
 const nameEl=document.getElementById('userName');
 const emailEl=document.getElementById('userEmail');
 const name=(nameEl?nameEl.value:state.answers.userName||state.answers.name||'').trim();
 const email=(emailEl?emailEl.value:state.answers.userEmail||state.answers.email||'').trim();
 state.answers.userName=name; state.answers.name=name;
 state.answers.userEmail=email; state.answers.email=email;
 save();
 return {name,email};
}
function validEmail(v){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(v||'').trim());}
function showTopStatus(msg,cls){const el=document.getElementById('topSendStatus'); if(el){el.textContent=msg; el.className='sendStatus '+(cls||'');}}
function buildPayload(){
 const ident=getUserIdentity();
 const doneKeys=Object.keys(state.done||{}).filter(k=>state.done[k]);
 const completedSections=doneKeys.map(k=>SECTIONS.findIndex(s=>s.id===k)+1).filter(n=>n>0);
 const progressPercent=Math.round(completedSections.length/SECTIONS.length*100);
 let quizScore=0;
 QUIZ.forEach((q,i)=>{if(Number(state.quiz[i])===q.correct)quizScore++;});
 const quizMaxScore=QUIZ.length;
 const quizPercent=quizMaxScore?Math.round(quizScore/quizMaxScore*100):0;
 return {
   timestamp:new Date().toISOString(),
   courseTitle:'SOL-Schulsozialarbeit Niedersachsen',
   bandNumber:4,
   bandTitle:'Kinderschutz, Krise und Gefährdungseinschätzung',
   moduleNumber:3,
   moduleTitle:'Vorgehen bei Verdacht auf Kindeswohlgefährdung, Niedersachsen/Emsland',
   modul:'Band 4 Modul 3',
   Modul:'Band 4 Modul 3',
   learnerName:ident.name,
   name:ident.name,
   email:ident.email,
   Email:ident.email,
   learnerId:'',
   progressPercent:progressPercent,
   completedSections:completedSections,
   totalSections:SECTIONS.length,
   quizScore:quizScore,
   quizMaxScore:quizMaxScore,
   quizPercent:quizPercent,
   quizPassed:state.quizPassed || quizPercent>=80,
   finalCompetenceSelfAssessment:state.answers.finalCompetenceSelfAssessment || state.answers.selfAssessment || '',
   answers:state.answers,
   quiz:state.quiz,
   done:state.done,
   analysis:state.analysis,
   userAgent:navigator.userAgent
 };
}
function finalize(){const t=(state.answers.t_transfer||'').trim(); if(!state.quizPassed){alert('Bitte zuerst den Gelingensnachweis mit mindestens 80 % bestehen.');return;} if(t.length<2000){alert('Der Transferauftrag benötigt mindestens 2000 Zeichen.');return;} state.done.abschluss=true; save(); updateProgress(); updateCompetence(); const ident=getUserIdentity(); const cn=document.getElementById('certName'); if(cn) cn.textContent=ident.name||'Teilnehmende Person'; document.getElementById('certDate').textContent=new Date().toLocaleDateString('de-DE'); document.getElementById('certificate').classList.remove('hidden');}

async function sendToSheets(){
 const box=document.getElementById('sendResult') || document.getElementById('topSendStatus');
 const ident=getUserIdentity();
 if(box && box.classList) box.classList.remove('hidden');
 if(!ident.name){const msg='Bitte zuerst den Namen eintragen.'; if(box) box.innerHTML=msg; showTopStatus(msg,''); return;}
 if(!validEmail(ident.email)){const msg='Bitte eine gültige E-Mail-Adresse eintragen.'; if(box) box.innerHTML=msg; showTopStatus(msg,''); return;}
 const payload=buildPayload();
 if(!APP_PUBLIC_URL || APP_PUBLIC_URL.includes('HIER_DEINE')){
   const msg='<strong>Google-Sheets-Hinweis:</strong> Es ist noch die Platzhalter-URL eingetragen. Die lokale Exportfunktion bleibt nutzbar. Zum Senden muss die Apps-Script-Web-App-URL in APP_PUBLIC_URL eingetragen werden.';
   if(box) box.innerHTML=msg;
   showTopStatus('Sheets-URL fehlt. Lokale Speicherung ist aktiv.','');
   return;
 }
 try{
   await fetch(APP_PUBLIC_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
   const msg='<strong>Gesendet.</strong> Wegen no-cors kann der Browser die Serverantwort nicht auslesen. Prüfen Sie den Eingang im Google Sheet.';
   if(box) box.innerHTML=msg;
   showTopStatus('Gesendet.','');
 }catch(err){
   const msg='<strong>Senden fehlgeschlagen:</strong> '+String(err.message||err);
   if(box) box.innerHTML=msg;
   showTopStatus('Senden fehlgeschlagen.','');
 }
}


function exportData(){const blob=new Blob([JSON.stringify(buildPayload(),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=MODULE_ID+'_export.json';a.click();}

render();
</script>
